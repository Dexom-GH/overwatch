name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  host-checks:
    name: Host lint + type + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # CI runs the HOST-runnable checks. Target runtime is Python 3.8, but
          # 3.8 compatibility is enforced statically by ruff (target-version =
          # py38); on-device (3.8) behavior is validated by the device-marked
          # tests on the Jetson, which are excluded here. Running CI on 3.11
          # mirrors the dev host and keeps modern ruff/mypy happy.
          python-version: "3.11"
          cache: pip

      - name: Install package + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff (lint; enforces 3.8 syntax via target-version)
        run: ruff check src tests

      - name: Mypy
        run: mypy src

      - name: Pytest (host only; device/gpu/zed excluded)
        run: pytest -m "not device and not gpu and not zed"

  dashboard-spa:
    # Operator-console SPA build (#124, ADR-0008). Node lives on the CI runner
    # ONLY — the build produces the static dist/ bundle the Python backend serves;
    # the Jetson never runs this build. Proves the SPA compiles and publishes the
    # bundle as an artifact (release.yml attaches it to the release for deploy.sh).
    name: Dashboard SPA build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/overwatch/output/dashboard/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/overwatch/output/dashboard/web/package-lock.json

      - name: Install (pinned)
        run: npm ci

      - name: Build SPA (type-check + bundle)
        run: npm run build

      - name: Upload dist bundle
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: src/overwatch/output/dashboard/web/dist
          if-no-files-found: error
