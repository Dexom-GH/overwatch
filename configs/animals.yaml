# Target animal classes for V1 — the single source of truth for the class set.
# class_id values are placeholders — they must match the detector's class map
# once the detector model is chosen/trained. ID difficulty is a note for the
# ReID work (rabbits/guinea pigs are hardest — low inter-individual variance).
#
# tier = data-availability tier for DETECTION (PO-approved 2026-06-02; see #5):
#   1 = spine species, public detection data exists → drives #15/#16
#   2 = data-gated, partial public data (poultry ~ COCO "bird")
#   3 = bespoke-data-gated, no public detection data → tracked in #35;
#       in V1 only if labeling lands in time, else demoted to V2.
# Custom detector fine-tuning is required regardless (COCO omits goat/rabbit/
# guinea pig). Detector-model pick deferred pending ADR-0005 (#27) + ADR-0006 (#29).

animals:
  - class_id: 0
    name: sheep            # includes ram
    reid_difficulty: medium
    tier: 1
  - class_id: 1
    name: goat
    reid_difficulty: medium
    tier: 1
  - class_id: 2
    name: poultry
    reid_difficulty: high
    tier: 2
  - class_id: 3
    name: rabbit
    reid_difficulty: very_high
    tier: 3                 # data-gated: no public detection data (#35)
  - class_id: 4
    name: guinea_pig
    reid_difficulty: very_high
    tier: 3                 # data-gated: no public detection data (#35)
