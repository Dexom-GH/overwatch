# Overwatch default runtime config (V1).
# Layered: these defaults are overridden by an optional override yaml, then by
# environment variables (see .env.example and src/overwatch/config/loader.py).
# Values below are placeholders to be tuned on-device.

bus:
  # ADR-0001 (accepted, hybrid): ZeroMQ for the high-rate ephemeral tier.
  transport: zeromq
  endpoint: ipc:///tmp/overwatch-bus   # ZeroMQ endpoint (not a secret)
  # Redis fallback path only: transport: redis + url_env: REDIS_URL (URL is a
  # secret resolved from that env var). Leave url_env null for ZeroMQ.
  url_env: null

capture:
  # V1 single-ZED form (kept for backward-compat, #30) — normalizes internally to
  # a one-element `sources` list. Multi-source (ADR-0006) uses the list form:
  #   sources:
  #     - {type: zed,  source_id: zed-0, fps: 15}
  #     - {type: rtsp, source_id: cam-n, fps: 10, url: "rtsp://host:554/stream",
  #        cred_env: RTSP_CRED_CAM_N}   # creds resolve from env, NEVER in YAML (#41)
  source: zed                 # zed | rtsp — multi-source uses the `sources` list above (#31)
  source_id: zed-0
  fps: 15                     # V1 committed default; sustained target, confirm on-device vs power mode (#46)

inference:
  detector_config: src/overwatch/inference/deepstream/configs/nvinfer_detector.txt
  tracker_config: src/overwatch/inference/deepstream/configs/nvtracker.txt
  reid:
    engine: models/megadescriptor_t224_fp16.engine
    # on-demand trigger policy (ADR-0003) — placeholders
    refresh_seconds: 30
    min_crop_confidence: 0.5

fusion:
  # Zone/fence format (#12). Authored on-site; validate with:
  #   python -m overwatch.fusion.zones --validate <config.yaml>   (--example prints a template)
  # space: image (pixel coords, default / mono RTSP) | ground (metres, ZED — needs
  # the on-device depth<->ground calibration, target-side). source_id ties to one
  # camera (optional in single-source V1). Example:
  #   zones:
  #     - name: pen-A
  #       polygon: [[100, 80], [540, 80], [540, 400], [100, 400]]
  #       # depth_min_m: 1.0   # optional ZED depth slab for count de-dup
  #       # depth_max_m: 6.0
  #   fences:
  #     - name: north-gate
  #       line: [[100, 80], [540, 80]]
  #       crossing: out_to_in   # any | in_to_out | out_to_in (out = left of the directed line)
  zones: []                   # define on-site (empty is flagged as must-tune)
  fences: []                  # fence lines for crossing detection (#20)
  health:
    immobility_seconds: 600   # placeholder: flag if stationary this long
    lameness_score_threshold: 0.6
  events:
    fence_zones: []

output:
  slack:
    webhook_env: SLACK_WEBHOOK
    min_severity: warning     # info | warning | critical
  store:
    # ADR-0001 (accepted, hybrid): SQLite EventStore for the durable tier.
    backend: sqlite
    path: data/overwatch.db   # event store db (dir created on-device)
    retention:                # bound growth on the 512 GB NVMe (#40; docs/STORAGE.md)
      max_age_days: 90        # prune EventStore records older than this
      max_rows: null          # optional hard row cap (null = age-only)
      interval_seconds: 3600  # how often the supervised retention sweeper runs (#106)
  throttle:
    # Shared alert de-dup / rate-limit (#42). De-dup key = (event_type, zone_id|track_id).
    cooldown_seconds: 60      # collapse identical alerts within this window (0 disables)
    max_per_window: null      # global burst cap per rate window (null = unlimited)
    rate_window_seconds: 60   # window for the burst cap
  dashboard:
    # Read-only operator dashboard (#18): thin local HTML, static refresh.
    host: 127.0.0.1           # bind address (on-site screen / localhost)
    port: 8080                # http port to serve the page on
    refresh_seconds: 5        # browser auto-refresh interval
    window_seconds: 3600      # trailing window of records shown
    alert_limit: 10           # max recent alerts listed
    event_limit: 10           # max recent events listed
